<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuku Kaka | Test</title>
    <link rel="stylesheet" href="./test.css">
</head>

<body>
    <h2><span class="green">T</span><span class="pink">r</span><span class="blue">y</span> <span class="green">I</span><span class="yellow">t</span><span class="pink">!</span></h2>

    <div class="test-container">
        <div class="text-area">
            <label for="arial-text">Your Text in Arial font</label>
            <textarea class="arial-text" placeholder="Enter your text..."></textarea>
            <div class="textarea-btns">
                <button class="clear">Clear</button>
                <button class="translate">Translate</button>
            </div>
        </div>

        <div class="text-area">
            <label for="kaka-text">The Text in Kaka font</label>
            <textarea class="kaka-text" placeholder="Your text in Kaka font..." readonly></textarea>
        </div>
    </div>

    <div class="off-screen-menu">
        <ul>
            <li><a href="index.html" data-text="Home" class="home-menu"><span class="blue">H</span><span class="pink">o</span><span class="green">m</span><span class="yellow">e</span></a></li>
            <li><a href="guide.html" data-text="Guide" class="guide-menu"><span class="yellow">G</span><span class="blue">u</span><span class="pink">i</span><span class="green">d</span><span class="blue">e</span></a></li>
            <li><a href="test.html" data-text="Test" class="test-menu"><span class="pink">T</span><span class="green">e</span><span class="yellow">s</span><span class="blue">t</span></a></li>
            <li><a href="download.html" data-text="Download" class="download-menu"><span class="green">D</span><span class="yellow">o</span><span class="blue">w</span><span class="pink">n</span><span class="yellow">l</span><span class="green">o</span><span class="blue">a</span><span class="pink">d</span></a></li>
        </ul>
    </div>
    <div class="nav-btn">
        <div class="nav-icon">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        const navBtn = document.querySelector(".nav-btn")
        const offScreenMenu = document.querySelector(".off-screen-menu")
        const arialText = document.querySelector(".arial-text")
        const kakaText = document.querySelector(".kaka-text")
        const clearBtn = document.querySelector(".clear")
        const translateBtn = document.querySelector(".translate")

        navBtn.addEventListener("click", () => {
            navBtn.classList.toggle("nav-open")
            offScreenMenu.classList.toggle("menu-open")
        })

        translateBtn.addEventListener("click", () => {
            kakaText.value = arialText.value
        })

        clearBtn.addEventListener("click", () => {
            arialText.value = ""
            kakaText.value = arialText.value
        })
    </script>
</body>

</html>
